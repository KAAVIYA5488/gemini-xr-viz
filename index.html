<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>LLM WebXR Viz - Gemini Voice Aura</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  </head>
  <body>
    <a-scene cursor="rayOrigin: mouse" raycaster="objects: .clickable">
      
      <a-sky color="#030308"></a-sky>
      
      <a-plane position="0 0 0" rotation="-90 0 0" width="50" height="50" color="#090914" material="roughness: 0.2; metalness: 0.8"></a-plane>
      <a-grid src="https://cdn.aframe.io/images/grid.png" position="0 0.01 0"></a-grid>

      <a-entity position="0 8 -15">
        <a-sphere radius="18" material="color: #EF2D5E; transparent: true; opacity: 0.05; shader: flat"
                  animation="property: scale; to: 1.1 1.1 1.1; dir: alternate; dur: 4000; loop: true; easing: easeInOutSine"></a-sphere>
        <a-sphere radius="12" material="color: #8C52FF; transparent: true; opacity: 0.1; shader: flat"
                  animation="property: scale; to: 1.2 1.2 1.2; dir: alternate; dur: 3000; loop: true; easing: easeInOutSine"></a-sphere>
        <a-sphere radius="6" material="color: #00E5FF; transparent: true; opacity: 0.15; shader: flat"
                  animation="property: scale; to: 1.3 1.3 1.3; dir: alternate; dur: 2000; loop: true; easing: easeInOutSine"></a-sphere>
      </a-entity>

      <a-entity id="rig" position="0 0 2.5">
        <a-camera position="0 1.6 0"></a-camera>
        <a-entity laser-controls="hand: left" raycaster="objects: .clickable"></a-entity>
        <a-entity laser-controls="hand: right" raycaster="objects: .clickable"></a-entity>
      </a-entity>

      <a-entity id="aiAvatar" position="2 1.8 -1.5" animation="property: position; to: 2 1.9 -1.5; dir: alternate; dur: 2000; loop: true; easing: easeInOutSine">
        <a-sphere radius="0.1" color="#EF2D5E" material="emissive: #EF2D5E; emissiveIntensity: 1"></a-sphere>
        <a-icosahedron radius="0.2" color="#66FCF1" wireframe="true" animation="property: rotation; to: 360 360 0; dur: 6000; loop: true; easing: linear"></a-icosahedron>
        
        <a-plane position="-1.2 0 0" width="2" height="0.8" color="#0B0C10" opacity="0.9" material="shader: flat">
          <a-text id="aiText" value="Hello! I am your AI Guide.\nReady to see how Gemini works?" align="center" position="0 0.1 0.05" scale="0.45 0.45 0.45" color="#66FCF1"></a-text>
        </a-plane>

        <a-box id="navBtn" class="clickable" position="-1.2 -0.3 0.05" width="0.8" height="0.15" depth="0.05" color="#66FCF1"
               animation__click="property: scale; to: 0.9 0.9 0.9; dur: 100; startEvents: click; dir: alternate; loop: 1">
          <a-text id="navText" value="START TOUR >" align="center" position="0 0 0.03" color="#0B0C10" scale="0.4 0.4 0.4"></a-text>
        </a-box>
      </a-entity>

      <a-entity id="scene0" visible="true" position="0 0 -2">
        <a-torus radius="0.8" radius-tubular="0.02" color="#EF2D5E" material="emissive: #EF2D5E; emissiveIntensity: 1" animation="property: rotation; to: 0 360 0; dur: 10000; loop: true; easing: linear"></a-torus>
        <a-torus radius="0.6" radius-tubular="0.01" color="#66FCF1" material="emissive: #66FCF1; emissiveIntensity: 0.5" animation="property: rotation; to: 360 0 0; dur: 8000; loop: true; easing: linear"></a-torus>
        <a-text value="GEMINI ARCHITECTURE\nSPATIAL VIZUALIZATION" align="center" position="0 0 0" scale="0.8 0.8 0.8" color="#FFF"></a-text>
      </a-entity>

      <a-entity id="scene1" visible="false" position="0 0 -2" scale="1.5 1.5 1.5">
        <a-cylinder position="0 0.5 0" radius="0.5" height="1" color="#8C52FF" material="roughness: 0.2; metalness: 0.1"></a-cylinder>
        <a-box id="textBlock" class="clickable" position="0 1.5 0" depth="0.3" height="0.3" width="0.8" color="#EF2D5E" animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear">
           <a-text value="Input Data" align="center" position="0 0 0.16" scale="0.6 0.6 0.6" color="white"></a-text>
        </a-box>
        <a-entity id="tokenContainer" position="0 1.5 0" visible="false">
          <a-box class="token" position="0 0 0" scale="0.1 0.1 0.1" color="#00E5FF" material="emissive: #00E5FF; emissiveIntensity: 0.8" animation__pos="property: position; to: -0.4 0.3 0.2; dur: 1000; startEvents: shatter; easing: easeOutQuad" animation__rot="property: rotation; to: 45 90 45; dur: 1000; startEvents: shatter; loop: true"></a-box>
          <a-box class="token" position="0 0 0" scale="0.1 0.1 0.1" color="#00E5FF" material="emissive: #00E5FF; emissiveIntensity: 0.8" animation__pos="property: position; to: 0.4 0.4 -0.1; dur: 1200; startEvents: shatter; easing: easeOutQuad" animation__rot="property: rotation; to: 90 45 0; dur: 1200; startEvents: shatter; loop: true"></a-box>
          <a-box class="token" position="0 0 0" scale="0.1 0.1 0.1" color="#00E5FF" material="emissive: #00E5FF; emissiveIntensity: 0.8" animation__pos="property: position; to: 0.1 -0.3 0.4; dur: 900; startEvents: shatter; easing: easeOutQuad" animation__rot="property: rotation; to: 0 90 90; dur: 900; startEvents: shatter; loop: true"></a-box>
        </a-entity>
      </a-entity>

      <a-entity id="scene2" visible="false" position="0 0 -2" scale="1.5 1.5 1.5">
        <a-cylinder position="0 0.5 0" radius="0.5" height="1" color="#8C52FF" material="roughness: 0.2; metalness: 0.1"></a-cylinder>
        <a-entity id="attentionWeb" position="0 1.8 0">
          <a-box id="centerToken" class="clickable" position="0 0 0" scale="0.15 0.15 0.15" color="#EF2D5E" material="emissive: #EF2D5E; emissiveIntensity: 0.5" animation="property: rotation; to: 360 360 0; loop: true; dur: 6000; easing: linear">
                 <a-text value="bark" align="center" position="0 0.8 0" scale="3 3 3" color="white"></a-text>
          </a-box>
          <a-box class="contextToken" position="-0.8 0.5 -0.2" scale="0.1 0.1 0.1" color="#00E5FF"><a-text value="tree" align="center" position="0 0.8 0" scale="4 4 4" color="white"></a-text></a-box>
          <a-box class="contextToken" position="0.8 0.2 0.3" scale="0.1 0.1 0.1" color="#00E5FF"><a-text value="dog" align="center" position="0 0.8 0" scale="4 4 4" color="white"></a-text></a-box>
          <a-box class="contextToken" position="0 -0.6 0.4" scale="0.1 0.1 0.1" color="#00E5FF"><a-text value="loud" align="center" position="0 -0.8 0" scale="4 4 4" color="white"></a-text></a-box>
        </a-entity>
      </a-entity>

      <a-entity id="scene3" visible="false" position="0 0 -2" scale="1.5 1.5 1.5">
        <a-cylinder position="0 0.5 0" radius="0.5" height="1" color="#8C52FF" material="roughness: 0.2; metalness: 0.1"></a-cylinder>
        <a-plane position="0 2 0" width="2" height="0.8" color="#1F2833">
          <a-text id="outputText" value="The dog barks at the..." align="center" position="0 0 0.05" scale="0.5 0.5 0.5" color="#FFF"></a-text>
        </a-plane>
        <a-entity position="0 1.2 0.2">
          <a-box id="generateBtn" class="clickable" position="-0.5 0 0" depth="0.2" height="0.2" width="0.8" color="#EF2D5E" animation__click="property: position; to: -0.5 -0.05 0; dur: 100; startEvents: click; dir: alternate; loop: 1">
             <a-text value="Predict Next Word" align="center" position="0 0 0.11" scale="0.35 0.35 0.35" color="white"></a-text>
          </a-box>
          <a-box id="tempToggle" class="clickable" position="0.5 0 0" depth="0.2" height="0.2" width="0.8" color="#00E5FF">
             <a-text id="tempText" value="Temperature: LOW" align="center" position="0 0 0.11" scale="0.35 0.35 0.35" color="#0B0C10"></a-text>
          </a-box>
        </a-entity>
      </a-entity>

    </a-scene>

    <script>
      // ==========================================
      // AUDIO SYSTEM (Web Audio API & SpeechSynthesis)
      // ==========================================
      let audioCtx;
      const synth = window.speechSynthesis;

      function initAudio() {
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
          audioCtx.resume();
        }
      }

      function playSound(type) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        const now = audioCtx.currentTime;

        if (type === 'click') {
          osc.type = 'sine';
          osc.frequency.setValueAtTime(800, now);
          osc.frequency.exponentialRampToValueAtTime(300, now + 0.1);
          gainNode.gain.setValueAtTime(0.3, now);
          gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
          osc.start(now);
          osc.stop(now + 0.1);
        } else if (type === 'chime') {
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(440, now);
          osc.frequency.exponentialRampToValueAtTime(880, now + 0.3);
          gainNode.gain.setValueAtTime(0.2, now);
          gainNode.gain.linearRampToValueAtTime(0, now + 0.5);
          osc.start(now);
          osc.stop(now + 0.5);
        }
      }

      function speakDialogue(text) {
        if (synth.speaking) { synth.cancel(); } 
        const cleanText = text.replace(/\n/g, ' ').replace(/>/g, ''); 
        const utterance = new SpeechSynthesisUtterance(cleanText);
        utterance.pitch = 1.1; 
        utterance.rate = 1.0;
        synth.speak(utterance);
      }

      // ==========================================
      // SCENE MANAGEMENT & LOGIC
      // ==========================================
      let currentStep = 0;
      
      const scenes = [
        document.querySelector('#scene0'),
        document.querySelector('#scene1'),
        document.querySelector('#scene2'),
        document.querySelector('#scene3')
      ];
      
      const aiText = document.querySelector('#aiText');
      const navBtn = document.querySelector('#navBtn');
      const navText = document.querySelector('#navText');

      const dialogue = [
        "Welcome to the Gemini LLM Simulator. I am your AI guide. Let's step inside the neural network.",
        "Step 1: Tokenization.\nWe don't read words. We break data\ninto puzzle pieces called tokens.\n\nClick the pink block to shatter it.",
        "Step 2: Self-Attention.\nHow do we know what a word means?\nBy connecting it to surrounding tokens.\n\nClick the center token to link context.",
        "Step 3: Autoregressive Generation.\nWe predict the next piece. Toggling\nTemperature makes the prediction\nmore creative.\n\nTry the controls below."
      ];

      navBtn.addEventListener('click', () => {
        initAudio(); 
        playSound('click');

        scenes[currentStep].setAttribute('visible', 'false');
        
        currentStep++;
        if (currentStep >= scenes.length) {
          currentStep = 0; 
          resetInteractions(); 
        }

        scenes[currentStep].setAttribute('visible', 'true');
        aiText.setAttribute('value', dialogue[currentStep]);
        speakDialogue(dialogue[currentStep]); 
        
        if (currentStep === 0) navText.setAttribute('value', 'START TOUR >');
        else if (currentStep === 3) navText.setAttribute('value', 'RESTART TOUR');
        else navText.setAttribute('value', 'NEXT STATION >');
      });

      // --- Interactive Logic for Stations ---
      const textBlock = document.querySelector('#textBlock');
      const tokenContainer = document.querySelector('#tokenContainer');
      const tokens = document.querySelectorAll('.token');
      
      const centerToken = document.querySelector('#centerToken');
      const attentionWeb = document.querySelector('#attentionWeb');
      
      const generateBtn = document.querySelector('#generateBtn');
      const tempToggle = document.querySelector('#tempToggle');
      const tempText = document.querySelector('#tempText');
      const outputText = document.querySelector('#outputText');

      let isHighTemp = false;

      textBlock.addEventListener('click', () => {
        playSound('chime');
        textBlock.setAttribute('visible', 'false');
        tokenContainer.setAttribute('visible', 'true');
        tokens.forEach(t => t.emit('shatter'));
        
        const responseText = "Great! Those tokens are much easier\nfor the math engine to process.\n\nClick Next Station.";
        aiText.setAttribute('value', responseText);
        speakDialogue(responseText); 
      });

      centerToken.addEventListener('click', () => {
        playSound('chime');
        centerToken.setAttribute('color', '#00E5FF');
        centerToken.setAttribute('material', 'emissive: #00E5FF; emissiveIntensity: 1');
        attentionWeb.setAttribute('line__1', 'start: 0 0 0; end: -0.8 0.5 -0.2; color: #00E5FF; opacity: 0.8');
        attentionWeb.setAttribute('line__2', 'start: 0 0 0; end: 0.8 0.2 0.3; color: #00E5FF; opacity: 0.8');
        attentionWeb.setAttribute('line__3', 'start: 0 0 0; end: 0 -0.6 0.4; color: #EF2D5E; opacity: 0.3');
        
        const responseText = "Notice the connections.\n'Bark' means something different next\nto 'tree' versus 'dog'.\n\nClick Next Station.";
        aiText.setAttribute('value', responseText);
        speakDialogue(responseText); 
      });

      tempToggle.addEventListener('click', () => {
        playSound('click');
        isHighTemp = !isHighTemp;
        if(isHighTemp) {
          tempToggle.setAttribute('color', '#EF2D5E');
          tempText.setAttribute('value', 'Temperature: HIGH');
          tempText.setAttribute('color', '#FFF');
        } else {
          tempToggle.setAttribute('color', '#00E5FF');
          tempText.setAttribute('value', 'Temperature: LOW');
          tempText.setAttribute('color', '#0B0C10');
        }
      });

      generateBtn.addEventListener('click', () => {
        playSound('chime');
        if(isHighTemp) {
          outputText.setAttribute('value', 'The dog barks at the... UFO');
          outputText.setAttribute('color', '#EF2D5E'); 
        } else {
          outputText.setAttribute('value', 'The dog barks at the... mailman');
          outputText.setAttribute('color', '#00E5FF'); 
        }
      });

      function resetInteractions() {
          textBlock.setAttribute('visible', 'true');
          tokenContainer.setAttribute('visible', 'false');
          centerToken.setAttribute('color', '#EF2D5E');
          centerToken.setAttribute('material', 'emissive: #EF2D5E; emissiveIntensity: 0.5');
          attentionWeb.removeAttribute('line__1');
          attentionWeb.removeAttribute('line__2');
          attentionWeb.removeAttribute('line__3');
          isHighTemp = false;
          tempToggle.setAttribute('color', '#00E5FF');
          tempText.setAttribute('value', 'Temperature: LOW');
          tempText.setAttribute('color', '#0B0C10');
          outputText.setAttribute('value', 'The dog barks at the...');
          outputText.setAttribute('color', '#FFF'); 
      }
    </script>
  </body>
</html>
