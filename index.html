<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>LLM WebXR Viz - Station 1: The Chopper</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.3/dist/aframe-environment-component.min.js"></script>
  </head>
  <body>
    <a-scene cursor="rayOrigin: mouse" raycaster="objects: .clickable">
      
      <a-entity environment="preset: default; skyType: atmosphere; lighting: point; groundColor: #e0e0e0; groundColor2: #fafafa; grid: cross"></a-entity>

      <a-entity id="rig" position="0 0 2">
        <a-camera position="0 1.6 0"></a-camera>
        <a-entity laser-controls="hand: left" raycaster="objects: .clickable"></a-entity>
        <a-entity laser-controls="hand: right" raycaster="objects: .clickable"></a-entity>
      </a-entity>

      <a-entity id="station1" position="0 0 -2">
        
        <a-cylinder position="0 0.5 0" radius="0.5" height="1" color="#4CC3D9" material="roughness: 0.2; metalness: 0.1"></a-cylinder>
        
        <a-box id="textBlock" class="clickable" position="0 1.5 0" depth="0.3" height="0.3" width="0.8" color="#EF2D5E" 
               animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear">
           <a-text value="Input Data" align="center" position="0 0 0.16" scale="0.6 0.6 0.6" color="white"></a-text>
        </a-box>

        <a-entity id="tokenContainer" position="0 1.5 0" visible="false">
          <a-box class="token" position="0 0 0" scale="0.1 0.1 0.1" color="#FFFF00" material="emissive: #FFFF00; emissiveIntensity: 0.6"
                 animation__pos="property: position; to: -0.4 0.3 0.2; dur: 1000; startEvents: shatter; easing: easeOutQuad"
                 animation__rot="property: rotation; to: 45 90 45; dur: 1000; startEvents: shatter; loop: true"></a-box>
          <a-box class="token" position="0 0 0" scale="0.1 0.1 0.1" color="#00FFFF" material="emissive: #00FFFF; emissiveIntensity: 0.6"
                 animation__pos="property: position; to: 0.4 0.4 -0.1; dur: 1200; startEvents: shatter; easing: easeOutQuad"
                 animation__rot="property: rotation; to: 90 45 0; dur: 1200; startEvents: shatter; loop: true"></a-box>
          <a-box class="token" position="0 0 0" scale="0.1 0.1 0.1" color="#FF00FF" material="emissive: #FF00FF; emissiveIntensity: 0.6"
                 animation__pos="property: position; to: 0.1 -0.3 0.4; dur: 900; startEvents: shatter; easing: easeOutQuad"
                 animation__rot="property: rotation; to: 0 90 90; dur: 900; startEvents: shatter; loop: true"></a-box>
          <a-box class="token" position="0 0 0" scale="0.1 0.1 0.1" color="#00FF00" material="emissive: #00FF00; emissiveIntensity: 0.6"
                 animation__pos="property: position; to: -0.2 -0.4 -0.3; dur: 1100; startEvents: shatter; easing: easeOutQuad"
                 animation__rot="property: rotation; to: 180 0 90; dur: 1100; startEvents: shatter; loop: true"></a-box>
        </a-entity>

        <a-entity id="infoPanel" position="0 2.5 0" visible="false"
                  animation="property: position; from: 0 1.5 0; to: 0 2.8 0; dur: 1500; startEvents: showPanel; easing: easeOutElastic">
          <a-plane color="#111" height="1" width="2.4" opacity="0.85" material="shader: flat"></a-plane>
          <a-text value="What is a Token?\n\nInstead of reading whole words, the AI breaks\ninformation into small puzzle pieces called\ntokens to process them much faster." 
                  color="#4CC3D9" align="center" position="0 0 0.05" scale="0.5 0.5 0.5" font="mozillavr"></a-text>
        </a-entity>

      </a-entity>
    </a-scene>

    <script>
      // The logic that drives the interaction
      const textBlock = document.querySelector('#textBlock');
      const infoPanel = document.querySelector('#infoPanel');
      const tokenContainer = document.querySelector('#tokenContainer');
      const tokens = document.querySelectorAll('.token');
      let isShattered = false;

      textBlock.addEventListener('click', function () {
        if (isShattered) return; // Only allow this to happen once
        isShattered = true;
        
        // 1. Hide the main text block and remove its clickability
        textBlock.setAttribute('visible', 'false');
        textBlock.classList.remove('clickable');
        
        // 2. Reveal the token container and trigger the explode animation
        tokenContainer.setAttribute('visible', 'true');
        tokens.forEach(token => {
          token.emit('shatter'); // This fires the animation__pos and animation__rot
        });
        
        // 3. Reveal and animate the educational pop-up panel
        infoPanel.setAttribute('visible', 'true');
        infoPanel.emit('showPanel'); // This fires the bounce animation
      });
    </script>
  </body>
</html>
