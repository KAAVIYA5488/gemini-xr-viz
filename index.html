<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>LLM WebXR Viz - Final Stable</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
  </head>
  <body>
    <a-scene cursor="rayOrigin: mouse" raycaster="objects: .clickable">
      
      <a-sky color="#000000"></a-sky>

      <a-entity id="rig" position="0 0 3">
        <a-camera position="0 1.6 0"></a-camera>
        <a-entity laser-controls="hand: left" raycaster="objects: .clickable"></a-entity>
        <a-entity laser-controls="hand: right" raycaster="objects: .clickable"></a-entity>
      </a-entity>

      <a-entity id="aiAvatar" position="3.5 2.2 -1.5" rotation="0 -20 0" animation="property: position; to: 3.5 2.3 -1.5; dir: alternate; dur: 3000; loop: true; easing: easeInOutSine">
        <a-sphere radius="0.1" color="#EF2D5E" material="emissive: #EF2D5E; emissiveIntensity: 1"></a-sphere>
        <a-icosahedron radius="0.2" color="#66FCF1" wireframe="true" animation="property: rotation; to: 360 360 0; dur: 8000; loop: true; easing: linear"></a-icosahedron>
        
        <a-plane position="-1.5 0 0" width="2.4" height="1" color="#0B0C10" opacity="0.95" material="shader: flat">
          <a-text id="aiText" value="System Ready.\n\nClick 'START TOUR' below to\ninitialize audio and begin." align="center" position="0 0.15 0.05" scale="0.45 0.45 0.45" color="#66FCF1"></a-text>
        </a-plane>

        <a-box id="navBtn" class="clickable" position="-1.5 -0.5 0.05" width="1.2" height="0.2" depth="0.05" color="#66FCF1"
               animation__click="property: scale; to: 0.9 0.9 0.9; dur: 100; startEvents: click; dir: alternate; loop: 1">
          <a-text id="navText" value="START TOUR >" align="center" position="0 0 0.03" color="#0B0C10" scale="0.45 0.45 0.45"></a-text>
        </a-box>
      </a-entity>

      <a-entity id="scene0" visible="true" position="0 1.6 -2.5">
        <a-text value="LET US LEARN\nHOW GEMINI WORKS" align="center" width="8" color="#FFF"></a-text>
        <a-text value="A Spatial AI Deep Dive" position="0 -0.8 0" align="center" width="5" color="#66FCF1"></a-text>
      </a-entity>

      <a-entity id="scene1" visible="false" position="0 0 -2" scale="1.5 1.5 1.5">
        <a-cylinder position="0 0.5 0" radius="0.5" height="1" color="#1F2833"></a-cylinder>
        <a-box id="textBlock" class="clickable" position="0 1.5 0" depth="0.3" height="0.3" width="1.2" color="#EF2D5E" animation="property: rotation; to: 0 360 0; loop: true; dur: 12000; easing: linear">
           <a-text value="The dog barks at the..." align="center" position="0 0 0.16" scale="0.5 0.5 0.5" color="white"></a-text>
        </a-box>
        <a-entity id="tokenContainer" position="0 1.5 0" visible="false">
          <a-entity position="0 0 0" animation__pos="property: position; to: -0.6 0.3 0.2; dur: 1000; startEvents: shatter">
            <a-box class="token" scale="0.1 0.1 0.1" color="#00E5FF"></a-box>
            <a-text value="The" align="center" position="0 0.2 0" scale="0.8 0.8 0.8" color="white" look-at="#rig"></a-text>
          </a-entity>
          <a-entity position="0 0 0" animation__pos="property: position; to: -0.2 0.5 -0.1; dur: 1200; startEvents: shatter">
            <a-box class="token" scale="0.1 0.1 0.1" color="#00E5FF"></a-box>
            <a-text value="dog" align="center" position="0 0.2 0" scale="0.8 0.8 0.8" color="white" look-at="#rig"></a-text>
          </a-entity>
          <a-entity position="0 0 0" animation__pos="property: position; to: 0.2 -0.2 0.3; dur: 900; startEvents: shatter">
            <a-box class="token" scale="0.1 0.1 0.1" color="#00E5FF"></a-box>
            <a-text value="barks" align="center" position="0 0.2 0" scale="0.8 0.8 0.8" color="white" look-at="#rig"></a-text>
          </a-entity>
          <a-entity position="0 0 0" animation__pos="property: position; to: 0.6 0.1 -0.2; dur: 1100; startEvents: shatter">
            <a-box class="token" scale="0.1 0.1 0.1" color="#00E5FF"></a-box>
            <a-text value="at" align="center" position="0 0.2 0" scale="0.8 0.8 0.8" color="white" look-at="#rig"></a-text>
          </a-entity>
        </a-entity>
      </a-entity>

      <a-entity id="scene2" visible="false" position="0 0 -2" scale="1.5 1.5 1.5">
        <a-cylinder position="0 0.5 0" radius="0.5" height="1" color="#1F2833"></a-cylinder>
        <a-entity id="attentionWeb" position="0 1.8 0">
          <a-entity position="0 0 0">
            <a-box id="centerToken" class="clickable" scale="0.15 0.15 0.15" color="#EF2D5E" animation="property: rotation; to: 360 360 0; loop: true; dur: 6000; easing: linear"></a-box>
            <a-text value="barks" align="center" position="0 0.3 0" scale="1 1 1" color="white" look-at="#rig"></a-text>
          </a-entity>
          <a-entity position="-1 0.5 -0.3"><a-box scale="0.1 0.1 0.1" color="#00E5FF"></a-box><a-text value="The" align="center" position="0 0.2 0" scale="0.8 0.8 0.8" color="white" look-at="#rig"></a-text></a-entity>
          <a-entity position="1 0.3 0.4"><a-box scale="0.1 0.1 0.1" color="#00E5FF"></a-box><a-text value="dog" align="center" position="0 0.2 0" scale="0.8 0.8 0.8" color="white" look-at="#rig"></a-text></a-entity>
          <a-entity position="0 -0.8 0.5"><a-box scale="0.1 0.1 0.1" color="#00E5FF"></a-box><a-text value="at" align="center" position="0 0.2 0" scale="0.8 0.8 0.8" color="white" look-at="#rig"></a-text></a-entity>
        </a-entity>
      </a-entity>

      <a-entity id="scene3" visible="false" position="0 0 -2" scale="1.5 1.5 1.5">
        <a-cylinder position="0 0.5 0" radius="0.5" height="1" color="#1F2833"></a-cylinder>
        <a-plane position="0 2.2 0" width="2.4" height="1.6" color="#0B0C10" opacity="0.95">
          <a-text value="AI PREDICTION PROBABILITIES" align="center" position="0 0.65 0.05" scale="0.4 0.4 0.4" color="#8C52FF"></a-text>
          <a-text id="prob1" value="mailman (88%)" align="center" position="0 0.3 0.05" scale="0.6 0.6 0.6" color="#00E5FF"></a-text>
          <a-text id="prob2" value="cat (10%)" align="center" position="0 0.05 0.05" scale="0.5 0.5 0.5" color="#FFF"></a-text>
          <a-text id="prob3" value="UFO (2%)" align="center" position="0 -0.2 0.05" scale="0.4 0.4 0.4" color="#666"></a-text>
          <a-plane position="0 -0.45 0.05" width="2.1" height="0.02" color="#333"></a-plane>
          <a-text id="outputText" value="Result: The dog barks at the mailman" align="center" position="0 -0.65 0.05" scale="0.5 0.5 0.5" color="#00E5FF"></a-text>
        </a-plane>
        <a-box id="tempToggle" class="clickable" position="0 1.2 0.2" width="1.4" height="0.3" depth="0.2" color="#00E5FF">
          <a-text id="tempText" value="Temperature: LOW\n(Safe Guess)" align="center" position="0 0 0.11" scale="0.4 0.4 0.4" color="#0B0C10"></a-text>
        </a-box>
      </a-entity>

    </a-scene>

    <script>
      let audioCtx;
      const synth = window.speechSynthesis;
      let currentStep = 0;
      const scenes = [document.querySelector('#scene0'), document.querySelector('#scene1'), document.querySelector('#scene2'), document.querySelector('#scene3')];
      const aiText = document.querySelector('#aiText');
      const navBtn = document.querySelector('#navBtn');
      const navText = document.querySelector('#navText');

      function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
      }

      function speak(t) {
        if (synth.speaking) synth.cancel();
        const u = new SpeechSynthesisUtterance(t.replace(/\n/g, ' '));
        u.pitch = 1.1; synth.speak(u);
      }

      navBtn.addEventListener('click', () => {
        initAudio();
        scenes[currentStep].setAttribute('visible', 'false');
        currentStep = (currentStep + 1) % 4;
        scenes[currentStep].setAttribute('visible', 'true');
        
        const dialogs = [
          "System Ready.",
          "Welcome! Let's process the sentence: 'The dog barks at the...'\n\nStep 1: Tokenization. Click the pink block to shatter the sentence into tokens.",
          "Step 2: Self-Attention. How do I know what 'barks' means? I connect it to surrounding context tokens. Click 'barks' to see connections.",
          "Step 3: Prediction. I guess the next word based on math. Low Temp equals safe, High Temp equals creative. Toggle to see!"
        ];
        
        aiText.setAttribute('value', dialogs[currentStep]);
        if(currentStep > 0) speak(dialogs[currentStep]);
        navText.setAttribute('value', currentStep === 3 ? "RESTART" : "NEXT STATION >");
      });

      document.querySelector('#textBlock').addEventListener('click', function() {
        this.setAttribute('visible', 'false');
        document.querySelector('#tokenContainer').setAttribute('visible', 'true');
        document.querySelectorAll('.token').forEach(t => t.parentElement.emit('shatter'));
      });

      document.querySelector('#centerToken').addEventListener('click', function() {
        this.setAttribute('color', '#00E5FF');
        document.querySelector('#attentionWeb').setAttribute('line__1', 'start: 0 0 0; end: -1 0.5 -0.3; color: #00E5FF');
        document.querySelector('#attentionWeb').setAttribute('line__2', 'start: 0 0 0; end: 1 0.3 0.4; color: #00E5FF');
        document.querySelector('#attentionWeb').setAttribute('line__3', 'start: 0 0 0; end: 0 -0.8 0.5; color: #EF2D5E; opacity: 0.3');
      });

      let isHigh = false;
      document.querySelector('#tempToggle').addEventListener('click', function() {
        isHigh = !isHigh;
        this.setAttribute('color', isHigh ? '#EF2D5E' : '#00E5FF');
        document.querySelector('#tempText').setAttribute('value', isHigh ? 'Temperature: HIGH\n(Creative Guess)' : 'Temperature: LOW\n(Safe Guess)');
        document.querySelector('#prob1').setAttribute('value', isHigh ? 'mailman (35%)' : 'mailman (88%)');
        document.querySelector('#prob3').setAttribute('value', isHigh ? 'UFO (25%)' : 'UFO (2%)');
        document.querySelector('#outputText').setAttribute('value', isHigh ? 'Result: The dog barks at the UFO' : 'Result: The dog barks at the mailman');
      });

      function resetInteractions() {
          document.querySelector('#textBlock').setAttribute('visible', 'true');
          document.querySelector('#tokenContainer').setAttribute('visible', 'false');
          document.querySelector('#centerToken').setAttribute('color', '#EF2D5E');
          document.querySelector('#attentionWeb').removeAttribute('line__1');
          document.querySelector('#attentionWeb').removeAttribute('line__2');
          document.querySelector('#attentionWeb').removeAttribute('line__3');
          isHigh = false;
          document.querySelector('#tempToggle').setAttribute('color', '#00E5FF');
          document.querySelector('#tempText').setAttribute('value', 'Temperature: LOW\n(Safe Guess)');
          document.querySelector('#outputText').setAttribute('value', 'Result: The dog barks at the mailman');
      }
    </script>
  </body>
</html>
